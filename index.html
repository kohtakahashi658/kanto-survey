<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>群馬観光チェックリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }

    header { text-align: center; padding: 20px 0 24px; }
    header h1 { font-size: 1.5rem; color: #1e3a5f; margin-bottom: 4px; }
    header p  { font-size: 0.85rem; color: #64748b; }

    /* Progress */
    .prog-wrap { max-width: 500px; margin: 0 auto 24px; }
    .prog-top { display: flex; justify-content: space-between; font-size: 0.78rem; color: #64748b; margin-bottom: 6px; }
    .prog-bg  { height: 8px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
    .prog-fill { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 99px; transition: width 0.4s ease; }

    /* Filter tabs */
    .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .filter-btn {
      border: 1.5px solid #e2e8f0; border-radius: 20px;
      padding: 6px 16px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; background: white; color: #64748b;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #1e3a5f; color: white; border-color: #1e3a5f; }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }

    /* Card */
    .spot-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      position: relative;
      user-select: none;
    }
    .spot-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(0,0,0,0.13); }

    /* Photo area */
    .photo {
      width: 100%; height: 180px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-emoji { font-size: 4.5rem; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.25)); }

    /* Category badge */
    .cat-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,0.45);
      color: white; font-size: 0.72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }

    /* Check button (top-right) */
    .check-btn {
      position: absolute; top: 10px; right: 10px;
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.9);
      border: 2px solid #e2e8f0;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 900;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      color: transparent;
    }
    .spot-card.checked .check-btn {
      background: #22c55e;
      border-color: #22c55e;
      color: white;
    }

    /* Checked tint */
    .spot-card.checked .photo::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(34,197,94,0.2);
      pointer-events: none;
    }

    /* Info */
    .info { padding: 14px 16px 16px; }
    .spot-name { font-size: 1.05rem; font-weight: 800; color: #1e293b; margin-bottom: 2px; }
    .spot-area { font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; }
    .spot-desc { font-size: 0.82rem; color: #475569; line-height: 1.6; }

    /* Reset */
    .reset-wrap { text-align: center; margin-top: 28px; }
    .reset-btn {
      background: none; border: 1.5px solid #cbd5e1;
      color: #64748b; border-radius: 10px;
      padding: 8px 24px; font-size: 0.85rem; cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: #94a3b8; color: #334155; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>🌿 群馬観光チェックリスト</h1>
  <p>行きたいスポットをタップしてチェック！</p>
</header>

<div class="prog-wrap">
  <div class="prog-top">
    <span id="checkedCount">0 / 10 チェック済み</span>
    <span id="checkedPct">0%</span>
  </div>
  <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterBy('all',this)">すべて</button>
  <button class="filter-btn" onclick="filterBy('温泉',this)">♨️ 温泉</button>
  <button class="filter-btn" onclick="filterBy('自然',this)">🏔️ 自然</button>
  <button class="filter-btn" onclick="filterBy('世界遺産',this)">🏛️ 世界遺産</button>
  <button class="filter-btn" onclick="filterBy('アクティビティ',this)">🎿 アクティビティ</button>
</div>

<div class="grid" id="grid"></div>

<div class="reset-wrap">
  <button class="reset-btn" onclick="resetAll()">チェックをリセット</button>
</div>

<script>
const SPOTS = [
  {
    id: 'kusatsu',
    name: '草津温泉',
    area: '吾妻郡草津町',
    cat: '温泉',
    emoji: '♨️',
    grad: 'linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%)',
    desc: '日本一の湧出量を誇る名湯。湯畑を中心に温泉街が広がり「西の河原公園」の絶景露天風呂も必見'
  },
  {
    id: 'ikaho',
    name: '伊香保温泉',
    area: '渋川市',
    cat: '温泉',
    emoji: '🪜',
    grad: 'linear-gradient(135deg, #f9ca24 0%, #f0932b 100%)',
    desc: '365段の石段街が有名。黄金の湯・白銀の湯の2源泉を持ち、石段沿いに旅館や土産物店が立ち並ぶ'
  },
  {
    id: 'shima',
    name: '四万温泉',
    area: '吾妻郡中之条町',
    cat: '温泉',
    emoji: '🏮',
    grad: 'linear-gradient(135deg, #4ecdc4 0%, #1a6b6b 100%)',
    desc: '「千と千尋の神隠し」のモデルとも言われる温泉郷。四万川沿いの緑豊かな渓谷が絶景'
  },
  {
    id: 'tomioka',
    name: '富岡製糸場',
    area: '富岡市',
    cat: '世界遺産',
    emoji: '🏭',
    grad: 'linear-gradient(135deg, #c8a96e 0%, #7a5230 100%)',
    desc: '2014年世界遺産登録。明治5年創業の日本最初の官営模範製糸場でフランス式の煉瓦建築が今も残る'
  },
  {
    id: 'tanigawa',
    name: '谷川岳',
    area: '利根郡みなかみ町',
    cat: '自然',
    emoji: '⛰️',
    grad: 'linear-gradient(135deg, #4facfe 0%, #00c6fb 100%)',
    desc: '標高1,977mの名峰。ロープウェイで天神平まで行け、紅葉シーズンの絶景が格別。岩壁登攀の聖地'
  },
  {
    id: 'minakami',
    name: 'みなかみ（水上）',
    area: '利根郡みなかみ町',
    cat: 'アクティビティ',
    emoji: '🌊',
    grad: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
    desc: '利根川でのラフティング・カヌーが人気。諏訪峡の紅葉も美しく温泉とアクティビティ両方楽しめる'
  },
  {
    id: 'haruna',
    name: '榛名山・榛名湖',
    area: '高崎市',
    cat: '自然',
    emoji: '🌋',
    grad: 'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
    desc: '上毛三山のひとつ。カルデラ湖の榛名湖に映る逆さ富士が絶景。春のヤマツツジの群生も圧巻'
  },
  {
    id: 'fukiware',
    name: '吹割の滝',
    area: '沼田市',
    cat: '自然',
    emoji: '💧',
    grad: 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)',
    desc: '「東洋のナイアガラ」と称される奇瀑。川の中に割れ目があり水が地面に吸い込まれるように流れ落ちる'
  },
  {
    id: 'myogi',
    name: '妙義山',
    area: '富岡市・安中市',
    cat: '自然',
    emoji: '🗻',
    grad: 'linear-gradient(135deg, #2d5016 0%, #4a7c59 100%)',
    desc: '奇岩怪石が連なる上毛三山のひとつ。白雲山・金洞山・金鶏山の三峰からなり紅葉の名所としても有名'
  },
  {
    id: 'akagi',
    name: '赤城山',
    area: '前橋市・渋川市',
    cat: '自然',
    emoji: '🌄',
    grad: 'linear-gradient(135deg, #f83600 0%, #f9d423 100%)',
    desc: '大沼・小沼の美しい湖沼群を持つ上毛三山のひとつ。冬はワカサギ釣り、春は新緑と四季通じて楽しめる'
  }
];

let checked = [];
try {
  checked = JSON.parse(localStorage.getItem('gunma-checked') || '[]');
} catch(e) { checked = []; }

function save() {
  try { localStorage.setItem('gunma-checked', JSON.stringify(checked)); } catch(e) {}
}

function updateProgress() {
  const n = checked.length, total = SPOTS.length;
  const pct = Math.round(n / total * 100);
  document.getElementById('checkedCount').textContent = n + ' / ' + total + ' チェック済み';
  document.getElementById('checkedPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
}

function toggleCheck(id) {
  if (checked.includes(id)) {
    checked = checked.filter(function(c) { return c !== id; });
  } else {
    checked.push(id);
  }
  save();
  const card = document.getElementById('card-' + id);
  card.classList.toggle('checked', checked.includes(id));
  card.querySelector('.check-btn').textContent = checked.includes(id) ? '✓' : '';
  updateProgress();
}

function filterBy(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  SPOTS.forEach(function(s) {
    const card = document.getElementById('card-' + s.id);
    if (!card) return;
    card.classList.toggle('hidden', cat !== 'all' && s.cat !== cat);
  });
}

function resetAll() {
  if (!confirm('チェックをすべてリセットしますか？')) return;
  checked = [];
  save();
  SPOTS.forEach(function(s) {
    const card = document.getElementById('card-' + s.id);
    card.classList.remove('checked');
    card.querySelector('.check-btn').textContent = '';
  });
  updateProgress();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  SPOTS.forEach(function(s) {
    const isChecked = checked.includes(s.id);
    const card = document.createElement('div');
    card.className = 'spot-card' + (isChecked ? ' checked' : '');
    card.id = 'card-' + s.id;

    const photo = document.createElement('div');
    photo.className = 'photo';
    photo.style.background = s.grad;

    const emoji = document.createElement('div');
    emoji.className = 'photo-emoji';
    emoji.textContent = s.emoji;

    const badge = document.createElement('div');
    badge.className = 'cat-badge';
    badge.textContent = s.cat;

    const checkBtn = document.createElement('div');
    checkBtn.className = 'check-btn';
    checkBtn.textContent = isChecked ? '✓' : '';

    photo.appendChild(emoji);
    photo.appendChild(badge);

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML =
      '<div class="spot-name">' + s.name + '</div>' +
      '<div class="spot-area">📍 ' + s.area + '</div>' +
      '<div class="spot-desc">' + s.desc + '</div>';

    card.appendChild(photo);
    card.appendChild(checkBtn);
    card.appendChild(info);

    card.addEventListener('click', function() { toggleCheck(s.id); });

    grid.appendChild(card);
  });
}

buildGrid();
updateProgress();
</script>
</body>
</html>
