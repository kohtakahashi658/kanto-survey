<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>関東観光地トーナメント</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #fef9c3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 36px 32px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    }

    /* Header */
    .header { text-align: center; margin-bottom: 28px; }
    .header h1 { font-size: 1.3rem; color: #1e3a5f; margin-bottom: 4px; }
    .header .desc { font-size: 0.85rem; color: #64748b; }

    /* Progress */
    .progress-wrap { margin-bottom: 28px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    .progress-bar-bg {
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #818cf8);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* VS section */
    .vs-label {
      text-align: center;
      font-size: 0.8rem;
      font-weight: bold;
      color: #94a3b8;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .choice-btn {
      border: 2.5px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
      background: white;
      position: relative;
      overflow: hidden;
    }

    .choice-btn:hover {
      border-color: #3b82f6;
      background: #eff6ff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(59,130,246,0.15);
    }

    .choice-btn:active { transform: scale(0.97); }

    .choice-btn .emoji { font-size: 2.4rem; display: block; margin-bottom: 10px; }
    .choice-btn .name { font-size: 1rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .choice-btn .pref { font-size: 0.75rem; color: #3b82f6; font-weight: 600; margin-bottom: 6px; }
    .choice-btn .note { font-size: 0.78rem; color: #64748b; line-height: 1.5; }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 900;
      color: #cbd5e1;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .choices-wrap { position: relative; }

    .vs-badge {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #f1f5f9;
      border: 2px solid #e2e8f0;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
      color: #94a3b8;
      z-index: 10;
      pointer-events: none;
    }

    /* Round badge */
    .round-badge {
      text-align: center;
      margin-bottom: 8px;
    }
    .round-badge span {
      display: inline-block;
      background: #eff6ff;
      color: #3b82f6;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid #bfdbfe;
    }

    /* Result */
    .result { display: none; text-align: center; }
    .result.show { display: block; }

    .result-emoji { font-size: 4rem; margin-bottom: 12px; }
    .result h2 { font-size: 1.5rem; color: #1e3a5f; margin-bottom: 6px; }
    .result .pref-name {
      font-size: 2.2rem;
      font-weight: 900;
      color: #3b82f6;
      margin: 16px 0 8px;
      letter-spacing: 0.05em;
    }
    .result .spot-name { font-size: 1rem; color: #475569; margin-bottom: 6px; }
    .result .result-note {
      font-size: 0.85rem;
      color: #64748b;
      background: #f8fafc;
      border-radius: 12px;
      padding: 14px 18px;
      margin: 16px 0 24px;
      line-height: 1.7;
    }

    .retry-btn {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 32px;
      font-size: 0.95rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .retry-btn:hover { background: #2563eb; }
    .retry-btn:active { transform: scale(0.97); }

    /* Animate in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate { animation: fadeUp 0.3s ease; }

    .form-section.hide { display: none; }
  </style>
</head>
<body>
<div class="card">

  <!-- Quiz -->
  <div class="form-section" id="quizSection">
    <div class="header">
      <h1>関東観光地トーナメント</h1>
      <div class="desc">どちらに行きたいか選んで、最終目的地を決めよう！</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="stepLabel">第1問</span>
        <span id="stepCount">1 / 7</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="round-badge"><span id="roundLabel">1回戦</span></div>
    <div class="vs-label">どちらに行きたい？</div>

    <div class="choices-wrap">
      <div class="choices animate" id="choicesEl">
        <div class="choice-btn" id="choiceA" onclick="choose(0)"></div>
        <div class="choice-btn" id="choiceB" onclick="choose(1)"></div>
      </div>
      <div class="vs-badge">VS</div>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="resultSection">
    <div class="result-emoji" id="resultEmoji"></div>
    <h2>あなたにおすすめの行き先は</h2>
    <div class="pref-name" id="resultPref"></div>
    <div class="spot-name" id="resultSpot"></div>
    <div class="result-note" id="resultNote"></div>
    <button class="retry-btn" onclick="reset()">もう一度やる</button>
  </div>

</div>

<script>
  // 8 destinations (perfect bracket: 8→4→2→1 = 7 questions)
  const SPOTS = [
    {
      name: '浅草・上野・渋谷',
      emoji: '🗼',
      pref: '東京都',
      note: '下町文化から最先端まで。食・ショッピング・観光が何でも揃う',
      tags: ['グルメ','ショッピング','文化']
    },
    {
      name: '秋葉原・お台場・新宿',
      emoji: '🏙️',
      pref: '東京都',
      note: 'ポップカルチャー・夜景・大型施設。都会を満喫したい人向け',
      tags: ['エンタメ','夜景','ショッピング']
    },
    {
      name: 'みなとみらい・横浜中華街',
      emoji: '⚓',
      pref: '神奈川県',
      note: '港町の絶景と本格中華グルメ。散歩も映えも楽しめる',
      tags: ['グルメ','景色','散歩']
    },
    {
      name: '鎌倉・江ノ島',
      emoji: '⛩️',
      pref: '神奈川県',
      note: '歴史ある寺社と海岸線。鎌倉大仏・江ノ電・しらす丼が名物',
      tags: ['歴史','自然','グルメ']
    },
    {
      name: '川越・秩父',
      emoji: '🏚️',
      pref: '埼玉県',
      note: '「小江戸」川越の蔵造り街並みと、秩父の山岳・温泉・ジビエ料理',
      tags: ['歴史','自然','温泉']
    },
    {
      name: '日光・那須',
      emoji: '🌿',
      pref: '栃木県',
      note: '世界遺産・東照宮、華厳の滝、那須高原の大自然と温泉',
      tags: ['歴史','自然','温泉']
    },
    {
      name: '草津・みなかみ',
      emoji: '♨️',
      pref: '群馬県',
      note: '日本有数の草津温泉と、みなかみのラフティング・紅葉が名物',
      tags: ['温泉','アクティビティ','自然']
    },
    {
      name: '大洗・水戸・偕楽園',
      emoji: '🌊',
      pref: '茨城県',
      note: '梅の名所・偕楽園、大洗の海鮮・アンコウ鍋が絶品',
      tags: ['自然','グルメ','歴史']
    },
  ];

  // Bracket: indices into SPOTS array
  // Round 1 matches: (0v1),(2v3),(4v5),(6v7) → 4 winners
  // Round 2: winner[0]v winner[1], winner[2]v winner[3] → 2 winners
  // Round 3: winner[0]v winner[1] → champion
  let bracket = [...SPOTS.keys()]; // [0,1,2,3,4,5,6,7]
  let roundWinners = [];
  let currentMatch = 0;
  let currentRoundMatches = [[0,1],[2,3],[4,5],[6,7]];
  let round = 1;
  let totalStep = 0;
  const TOTAL_STEPS = 7;

  function getRoundLabel(r) {
    return r === 1 ? '1回戦' : r === 2 ? '準決勝' : '決勝';
  }

  function renderMatch() {
    if (currentMatch >= currentRoundMatches.length) {
      // Move to next round
      round++;
      const w = roundWinners;
      roundWinners = [];
      if (w.length === 1) {
        showResult(w[0]);
        return;
      }
      currentRoundMatches = [];
      for (let i = 0; i < w.length; i += 2) {
        currentRoundMatches.push([w[i], w[i+1]]);
      }
      currentMatch = 0;
    }

    totalStep = (round === 1 ? 0 : round === 2 ? 4 : 6) + currentMatch;
    const [ia, ib] = currentRoundMatches[currentMatch];
    const a = SPOTS[ia], b = SPOTS[ib];

    document.getElementById('roundLabel').textContent = getRoundLabel(round);
    document.getElementById('stepLabel').textContent = `第${totalStep + 1}問`;
    document.getElementById('stepCount').textContent = `${totalStep + 1} / ${TOTAL_STEPS}`;
    document.getElementById('progressFill').style.width = `${(totalStep / TOTAL_STEPS) * 100}%`;

    renderBtn('choiceA', a);
    renderBtn('choiceB', b);

    const el = document.getElementById('choicesEl');
    el.classList.remove('animate');
    void el.offsetWidth;
    el.classList.add('animate');
  }

  function renderBtn(id, spot) {
    const el = document.getElementById(id);
    el.innerHTML = `
      <span class="emoji">${spot.emoji}</span>
      <div class="name">${spot.name}</div>
      <div class="pref">${spot.pref}</div>
      <div class="note">${spot.note}</div>
    `;
  }

  function choose(side) {
    const [ia, ib] = currentRoundMatches[currentMatch];
    const winner = side === 0 ? ia : ib;
    roundWinners.push(winner);
    currentMatch++;
    renderMatch();
  }

  function showResult(idx) {
    const spot = SPOTS[idx];
    document.getElementById('resultEmoji').textContent = spot.emoji;
    document.getElementById('resultPref').textContent = spot.pref;
    document.getElementById('resultSpot').textContent = spot.name;
    document.getElementById('resultNote').textContent = spot.note;
    document.getElementById('progressFill').style.width = '100%';
    document.getElementById('stepCount').textContent = `${TOTAL_STEPS} / ${TOTAL_STEPS}`;

    document.getElementById('quizSection').classList.add('hide');
    const res = document.getElementById('resultSection');
    res.classList.add('show');
    res.classList.remove('animate');
    void res.offsetWidth;
    res.classList.add('animate');
  }

  function reset() {
    round = 1;
    currentMatch = 0;
    roundWinners = [];
    totalStep = 0;
    currentRoundMatches = [[0,1],[2,3],[4,5],[6,7]];

    document.getElementById('resultSection').classList.remove('show');
    document.getElementById('quizSection').classList.remove('hide');
    renderMatch();
  }

  // Start
  renderMatch();
</script>
</body>
</html>
